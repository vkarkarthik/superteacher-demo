<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Creativecoder | SuperTeacher</title>
  <link rel="stylesheet" href="../css/global.css">
</head>
<body data-root="../" data-active="curriculum" data-series="creativecoder">
  <header id="site-header"></header>
  
<main class="page">
  <div class="page-top">
    <span>Computer Science / <span id="breadcrumb-board">Board</span> / Grade-wise Books</span>
    <a class="back-link" href="javascript:history.back()">Back to offerings</a>
  </div>
  <section class="page-heading">
    <div>
      <div class="breadcrumb">Overview / Curriculum / Computer Science / Series</div>
      <h1 id="page-title">Choose a Grade</h1>
    </div>
    <p id="page-description"></p>
  </section>

  <section id="grade-stage" class="grade-stage">
    <div class="orbit-area">
      <div class="grade-track"></div>
      <div id="grade-core" class="grade-core">
        <div id="grade-core-icon" class="grade-core-icon"></div>
        <strong id="grade-core-title">Series</strong>
        <span id="grade-core-context" class="grade-core-context">Board</span>
        <small>Choose a grade</small>
      </div>
      <div id="grade-ring" class="grade-ring"></div>
    </div>
    <div class="grade-instruction">Select a grade to open the book preview</div>
  </section>
</main>

  <div id="toast" class="toast"></div>
  <script src="../js/catalog.js"></script>
  <script src="../js/common.js?v=4"></script>
